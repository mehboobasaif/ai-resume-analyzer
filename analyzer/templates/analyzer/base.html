{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ATS Resume Analyzer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'analyzer/css/style.css' %}">

</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand" href="/">

                <i class="bi bi-robot"></i> ATS Analyzer

            </a>

            <div>

                {% if request.user.is_authenticated %}

                    <a href="/" class="btn btn-light me-2">

                        Home

                    </a>

                    <a href="/history/" class="btn btn-light me-2">

                        History

                    </a>

                    <a href="/logout/" class="btn btn-danger">

                        Logout

                    </a>

                {% else %}

                    <a href="/login/" class="btn btn-light me-2">

                        Login

                    </a>

                    <a href="/register/" class="btn btn-success">

                        Register

                    </a>

                {% endif %}

            </div>

        </div>

    </nav>

    <div class="container mt-5">

        {% block content %}

        {% endblock %}

    </div>

    <footer class="bg-dark text-white text-center p-3 mt-5">

        ATS Resume Analyzer © 2026

    </footer>

</body>

</html>
